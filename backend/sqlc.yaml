version: "2"
sql:
  - schema: "db/migrations"
    queries: "db/queries"
    engine: "sqlserver"
    gen:
      go:
        package: "generated"
        out: "internal/platform/db/generated"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
