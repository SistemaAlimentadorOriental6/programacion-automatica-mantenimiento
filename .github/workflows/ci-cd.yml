name: CI/CD Programación Automatía

on:
  push:
    branches:
      - main

jobs:
  # ─── Validar Backend ────────────────────────────────────────────
  backend:
    name: Build Backend
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Descargar dependencias y compilar
        run: |
          go -C ./backend mod download
          go -C ./backend build -o server ./cmd/api/main.go

  # ─── Validar Frontend ───────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Instalar dependencias y compilar Astro
        run: |
          pnpm install
          pnpm run build

  # ─── Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: [self-hosted, Linux, X64]
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # Sincroniza los archivos nuevos al directorio de producción sin borrar .env ni logs
      - name: Sincronizar archivos a producción
        run: |
          DEPLOY_DIR="/var/www/mantenimiento/programacion-automatia"
          mkdir -p "$DEPLOY_DIR"
          
          echo "Sincronizando archivos nuevos..."
          rsync -av --exclude='.git/' --exclude='node_modules/' --exclude='backend/server' --exclude='backend.log' --exclude='.env' ./ "$DEPLOY_DIR/"

      # Compila el backend Go desde la ruta de producción
      - name: Compilar Backend Go
        run: |
          go -C /var/www/mantenimiento/programacion-automatia/backend mod download
          go -C /var/www/mantenimiento/programacion-automatia/backend build -o server ./cmd/api/main.go

      # Instala dependencias y genera el build estático de Astro
      - name: Build del Frontend Astro
        working-directory: /var/www/mantenimiento/programacion-automatia
        run: |
          pnpm install
          pnpm run build

      # Reinicia solo el backend (solo si el binario cambió)
      - name: Reiniciar Backend con PM2
        working-directory: /var/www/mantenimiento/programacion-automatia/backend
        run: |
          pm2 delete programacion_automatia_backend || true
          PORT=3043 pm2 start ./server --name programacion_automatia_backend
          pm2 save

      # Reinicia el frontend estático
      - name: Reiniciar Frontend con PM2
        working-directory: /var/www/mantenimiento/programacion-automatia
        run: |
          pm2 delete programacion_automatia_frontend || true
          pm2 start "pnpm dlx serve dist -l 3044" --name programacion_automatia_frontend
          pm2 save

      - name: Deploy completado
        run: echo "Deploy exitoso — Frontend:3044 | Backend:3043"